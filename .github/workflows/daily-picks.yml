name: Picks du Jour
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@3
      - name: Generate picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-picks.js
      - name: Commit
        run: |
          git config user.name "PronoSight Bot"
          git config user.email "bot@pronosight.local"
          git add picks/today.json picks/history.json
          git diff --staged --quiet || git commit -m "Picks du $(date '+%d/%m/%Y')"
          git push
